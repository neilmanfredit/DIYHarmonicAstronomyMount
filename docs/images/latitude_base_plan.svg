<?xml version="1.0" encoding="UTF-8"?>
<!--
  HEM-001 — Latitude Base Plan View
  Top-down schematic showing how the azimuth plate, hinge brackets,
  and tangent arm sit relative to each other before the altitude
  plate and mount body are added on top.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" width="680" height="560" font-family="Arial, Helvetica, sans-serif">

  <rect x="0" y="0" width="680" height="560" fill="#ffffff"/>

  <text x="340" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#0d1b3e">Latitude base — plan view</text>
  <text x="340" y="52" text-anchor="middle" font-size="12" fill="#666">Looking down at the azimuth plate from above</text>

  <!-- Tripod leg positions (dashed, behind everything) -->
  <g stroke="#ccc" stroke-width="1" stroke-dasharray="4,3" fill="none">
    <line x1="340" y1="300" x2="340" y2="120"/>
    <line x1="340" y1="300" x2="200" y2="420"/>
    <line x1="340" y1="300" x2="480" y2="420"/>
  </g>
  <circle cx="340" cy="120" r="6" fill="#eee" stroke="#999" stroke-width="1"/>
  <circle cx="200" cy="420" r="6" fill="#eee" stroke="#999" stroke-width="1"/>
  <circle cx="480" cy="420" r="6" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="340" y="108" text-anchor="middle" font-size="9" fill="#999">tripod leg</text>

  <!-- Azimuth plate outline -->
  <rect x="220" y="180" width="240" height="200" rx="18" fill="#dce6f5" stroke="#0d1b3e" stroke-width="1.5"/>
  <text x="340" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d1b3e">Azimuth plate</text>

  <!-- Central tripod stud -->
  <circle cx="340" cy="280" r="14" fill="#fff" stroke="#0d1b3e" stroke-width="1.5"/>
  <circle cx="340" cy="280" r="5" fill="#0d1b3e"/>
  <text x="340" y="312" text-anchor="middle" font-size="9" fill="#444">3/8" stud</text>

  <!-- AZ arc slots (front and rear) -->
  <path d="M 305 220 A 80 80 0 0 1 375 220" fill="none" stroke="#c8a82c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 305 340 A 80 80 0 0 0 375 340" fill="none" stroke="#c8a82c" stroke-width="5" stroke-linecap="round"/>
  <text x="430" y="218" font-size="10" fill="#8a6d10">AZ trim slot</text>
  <text x="430" y="345" font-size="10" fill="#8a6d10">AZ trim slot</text>
  <line x1="380" y1="220" x2="425" y2="220" stroke="#c8a82c" stroke-width="0.75" stroke-dasharray="2,2"/>
  <line x1="380" y1="340" x2="425" y2="340" stroke="#c8a82c" stroke-width="0.75" stroke-dasharray="2,2"/>

  <!-- Hinge brackets (rear edge) -->
  <rect x="245" y="360" width="20" height="26" fill="#b8c8e0" stroke="#0d1b3e" stroke-width="1"/>
  <rect x="415" y="360" width="20" height="26" fill="#b8c8e0" stroke="#0d1b3e" stroke-width="1"/>
  <text x="255" y="410" text-anchor="middle" font-size="9" fill="#444">Hinge</text>
  <text x="425" y="410" text-anchor="middle" font-size="9" fill="#444">Hinge</text>

  <!-- Tangent arm block (front edge) -->
  <rect x="318" y="190" width="44" height="34" fill="#f0d9a8" stroke="#8a6d10" stroke-width="1.2"/>
  <text x="340" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#8a6d10">Tangent arm block</text>
  <circle cx="340" cy="207" r="6" fill="#fff" stroke="#8a6d10" stroke-width="1"/>

  <!-- Bubble level -->
  <circle cx="430" cy="350" r="9" fill="#fff" stroke="#0d1b3e" stroke-width="1"/>
  <circle cx="430" cy="350" r="4" fill="#a8e0c4"/>
  <text x="450" y="354" font-size="9" fill="#444">level</text>

  <!-- North arrow -->
  <g transform="translate(560,260)">
    <line x1="0" y1="30" x2="0" y2="-20" stroke="#0d1b3e" stroke-width="1.5" marker-end="url(#arrow2)"/>
    <text x="0" y="-28" text-anchor="middle" font-size="11" font-weight="bold" fill="#0d1b3e">N</text>
  </g>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0d1b3e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="560" y="305" text-anchor="middle" font-size="9" fill="#777">point tripod</text>
  <text x="560" y="317" text-anchor="middle" font-size="9" fill="#777">roughly north</text>

  <!-- Legend -->
  <g>
    <rect x="40" y="420" width="200" height="110" fill="#fafafa" stroke="#ccc" stroke-width="0.5" rx="4"/>
    <text x="50" y="440" font-size="11" font-weight="bold" fill="#0d1b3e">Legend</text>
    <rect x="50" y="450" width="14" height="10" fill="#dce6f5" stroke="#0d1b3e" stroke-width="1"/>
    <text x="70" y="459" font-size="10" fill="#444">Azimuth plate body</text>
    <rect x="50" y="468" width="14" height="6" fill="#c8a82c"/>
    <text x="70" y="476" font-size="10" fill="#444">AZ trim arc slots (±8°)</text>
    <rect x="50" y="486" width="14" height="10" fill="#b8c8e0" stroke="#0d1b3e" stroke-width="1"/>
    <text x="70" y="495" font-size="10" fill="#444">Hinge bracket positions</text>
    <rect x="50" y="504" width="14" height="10" fill="#f0d9a8" stroke="#8a6d10" stroke-width="1"/>
    <text x="70" y="513" font-size="10" fill="#444">Tangent arm block</text>
  </g>

  <text x="340" y="548" text-anchor="middle" font-size="10" fill="#999">Schematic for orientation only — see cad/latitude-base/ for accurate dimensions</text>

</svg>
